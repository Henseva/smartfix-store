<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartFlix — Assistência Premium & Acessórios</title>
  <meta name="description" content="SmartFlix — assistência técnica premium e acessórios para celular em Porto Velho. Site com abas, painel lateral, menu mobile e orçamento rápido." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#070b14;
      --bg-soft:#0c1322;
      --panel:#111a2b;
      --line:rgba(255,255,255,.08);
      --line-strong:rgba(255,255,255,.14);
      --text:#f5f7fb;
      --muted:rgba(245,247,251,.70);
      --muted-2:rgba(245,247,251,.44);
      --blue:#3b82f6;
      --cyan:#38bdf8;
      --green:#34d399;
      --gold:#fbbf24;
      --shadow:0 20px 60px rgba(0,0,0,.35);
      --shadow-soft:0 10px 30px rgba(0,0,0,.25);
      --grad-main:linear-gradient(135deg,#3b82f6 0%, #38bdf8 100%);
      --grad-panel:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.03));
      --grad-hero:
        radial-gradient(circle at 82% 18%, rgba(59,130,246,.18), transparent 0 24%),
        radial-gradient(circle at 12% 85%, rgba(56,189,248,.10), transparent 0 20%),
        linear-gradient(180deg,#070b14 0%, #0b1220 100%);
    }

    *{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{
      font-family:'Inter',sans-serif;
      background:var(--grad-hero);
      color:var(--text);
      overflow-x:hidden;
      -webkit-tap-highlight-color:transparent;
    }
    a{text-decoration:none;color:inherit}
    button{font:inherit;border:none;cursor:pointer}
    .container{width:min(1120px, calc(100% - 28px));margin:0 auto}

    .announce{
      background:linear-gradient(90deg,#10203c 0%, #143267 50%, #10203c 100%);
      border-bottom:1px solid var(--line);
      color:#fff;font-size:12.5px;
    }
    .announce-inner{
      min-height:42px;display:flex;align-items:center;justify-content:center;gap:8px;
      text-align:center;padding:8px 0;
    }
    .announce a{color:#d7e7ff;font-weight:700;text-decoration:underline;text-underline-offset:2px}

    .nav{
      position:sticky;top:0;z-index:60;
      backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
      background:rgba(7,11,20,.78);
      border-bottom:1px solid var(--line);
    }
    .nav-inner{
      min-height:74px;display:flex;align-items:center;justify-content:space-between;gap:16px;
    }
    .brand{display:flex;align-items:center;gap:12px;min-width:0}
    .brand-icon{
      width:38px;height:38px;border-radius:12px;
      background:linear-gradient(135deg,#13284e,#173e74);
      border:1px solid rgba(255,255,255,.08);
      display:flex;align-items:center;justify-content:center;
      box-shadow:var(--shadow-soft);flex-shrink:0;font-size:16px;
    }
    .brand-name{
      font-family:'Space Grotesk',sans-serif;
      font-size:18px;font-weight:700;letter-spacing:-.6px;line-height:1;
    }
    .brand-sub{font-size:11px;color:var(--muted-2);margin-top:4px;white-space:nowrap}

    .nav-actions{display:flex;align-items:center;gap:10px}
    .nav-link{
      color:var(--muted);font-size:13px;font-weight:600;
      padding:10px 14px;border-radius:999px;transition:.2s ease;
    }
    .nav-link:hover{background:rgba(255,255,255,.05);color:#fff}
    .nav-cta{
      background:var(--grad-main);color:#fff;padding:11px 18px;border-radius:999px;
      font-size:13px;font-weight:800;box-shadow:0 12px 28px rgba(59,130,246,.22);
    }
    .menu-toggle{
      display:none;
      width:42px;height:42px;border-radius:14px;
      background:rgba(255,255,255,.04);
      border:1px solid var(--line);
      color:#fff;font-size:20px;
      align-items:center;justify-content:center;
    }

    .mobile-menu{
      position:fixed;inset:0;
      background:rgba(7,11,20,.96);
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
      z-index:70;
      opacity:0;pointer-events:none;
      transition:.22s ease;
    }
    .mobile-menu.show{
      opacity:1;pointer-events:auto;
    }
    .mobile-menu-inner{
      min-height:100vh;
      display:flex;flex-direction:column;
      padding:20px;
    }
    .mobile-menu-top{
      display:flex;align-items:center;justify-content:space-between;
      margin-bottom:40px;
    }
    .mobile-close{
      width:42px;height:42px;border-radius:14px;
      background:rgba(255,255,255,.04);
      border:1px solid var(--line);
      color:#fff;font-size:20px;
    }
    .mobile-links{
      display:flex;flex-direction:column;gap:12px;
    }
    .mobile-links a{
      padding:16px 18px;
      border-radius:18px;
      background:rgba(255,255,255,.03);
      border:1px solid var(--line);
      color:#fff;
      font-weight:700;
    }
    .mobile-links .mobile-cta{
      background:var(--grad-main);
      border:none;
    }

    .hero{padding:72px 0 28px}
    .hero-grid{display:grid;grid-template-columns:1.08fr .92fr;gap:28px;align-items:stretch}
    .hero-copy{padding:20px 0}
    .eyebrow{
      display:inline-flex;align-items:center;gap:9px;padding:9px 16px;border-radius:999px;
      background:rgba(59,130,246,.08);border:1px solid rgba(96,165,250,.15);
      color:#bfd8ff;font-size:12px;font-weight:700;margin-bottom:20px;
    }
    .eyebrow-dot{
      width:6px;height:6px;border-radius:50%;background:var(--green);
      box-shadow:0 0 0 6px rgba(52,211,153,.12);
    }
    .hero-title{
      font-family:'Space Grotesk',sans-serif;
      font-size:clamp(38px, 6vw, 72px);
      line-height:1.02;letter-spacing:-2px;margin-bottom:18px;max-width:650px;
    }
    .hero-title .hl{
      background:linear-gradient(90deg,#ffffff 0%, #8fbcff 100%);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    }
    .hero-sub{max-width:560px;color:var(--muted);font-size:16px;line-height:1.8;margin-bottom:26px}
    .hero-buttons{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:28px}

    .btn{
      display:inline-flex;align-items:center;justify-content:center;gap:10px;
      padding:15px 24px;border-radius:999px;font-size:14px;font-weight:800;transition:.22s ease;white-space:nowrap;
    }
    .btn-primary{
      background:var(--grad-main);color:#fff;box-shadow:0 14px 32px rgba(59,130,246,.24);
    }
    .btn-primary:hover{transform:translateY(-2px);filter:brightness(1.03)}
    .btn-secondary{
      background:rgba(255,255,255,.04);color:#fff;border:1px solid var(--line-strong);
    }
    .btn-secondary:hover{background:rgba(255,255,255,.07)}

    .hero-metrics{
      display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;max-width:760px;
    }
    .metric{
      background:rgba(255,255,255,.035);border:1px solid var(--line);
      border-radius:18px;padding:17px 16px;box-shadow:var(--shadow-soft);
    }
    .metric strong{
      display:block;font-family:'Space Grotesk',sans-serif;font-size:26px;letter-spacing:-1px;margin-bottom:4px;
    }
    .metric span{display:block;color:var(--muted);font-size:12px;line-height:1.55}

    .hero-panel{
      background:var(--grad-panel);border:1px solid var(--line);border-radius:30px;
      padding:18px;box-shadow:var(--shadow);position:relative;overflow:hidden;min-height:100%;
    }
    .hero-panel::before{
      content:"";position:absolute;inset:0;
      background:radial-gradient(circle at 82% 16%, rgba(96,165,250,.12), transparent 32%);
      pointer-events:none;
    }
    .hero-panel-top{
      display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px;position:relative;z-index:1;
    }
    .hero-panel-tag{
      color:#bdd7ff;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.14em;
    }
    .hero-panel-dots{display:flex;gap:7px}
    .hero-panel-dots span{
      width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.18);
    }
    .hero-panel-dots span:nth-child(1){background:#f87171}
    .hero-panel-dots span:nth-child(2){background:#fbbf24}
    .hero-panel-dots span:nth-child(3){background:#34d399}

    .device-stage{
      height:400px;border-radius:24px;border:1px solid rgba(255,255,255,.07);
      background:
        radial-gradient(circle at 50% 22%, rgba(96,165,250,.16), transparent 34%),
        linear-gradient(180deg,#0d1629 0%, #101c31 100%);
      position:relative;overflow:hidden;
    }
    .device-stage::before{
      content:"";position:absolute;inset:18px;border:1px solid rgba(255,255,255,.05);border-radius:18px;
    }
    .phone{
      position:absolute;left:50%;top:52%;transform:translate(-50%,-50%);
      width:196px;height:350px;border-radius:38px;
      background:linear-gradient(180deg,#192a45 0%, #0c1525 100%);
      border:1px solid rgba(255,255,255,.12);
      box-shadow:0 26px 56px rgba(0,0,0,.34);overflow:hidden;
    }
    .phone::before{
      content:"";position:absolute;top:12px;left:50%;transform:translateX(-50%);
      width:76px;height:12px;border-radius:999px;background:rgba(255,255,255,.07);z-index:2;
    }
    .phone-screen{
      position:absolute;inset:16px;border-radius:26px;
      background:
        radial-gradient(circle at 32% 24%, rgba(96,165,250,.25), transparent 34%),
        linear-gradient(180deg,#16315b 0%, #10243f 60%, #0f1c31 100%);
      padding:16px;display:flex;flex-direction:column;justify-content:flex-end;
    }
    .phone-bars{
      background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);
      border-radius:18px;padding:14px;
    }
    .bar{height:10px;border-radius:999px;background:rgba(255,255,255,.10);margin-bottom:10px}
    .bar.sm{width:56%}.bar.md{width:72%}.bar.lg{width:100%}
    .mini-cards{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
    .mini-cards span{display:block;height:44px;border-radius:12px;background:rgba(255,255,255,.08)}

    .float-chip{
      position:absolute;background:rgba(8,15,28,.92);border:1px solid var(--line);
      border-radius:16px;padding:13px 15px;box-shadow:var(--shadow-soft);z-index:2;
    }
    .float-chip small{
      display:block;font-size:10px;color:var(--muted-2);text-transform:uppercase;letter-spacing:.12em;margin-bottom:5px;
    }
    .float-chip strong{
      display:block;font-family:'Space Grotesk',sans-serif;font-size:15px;letter-spacing:-.4px;
    }
    .chip-1{top:22px;left:18px}.chip-2{top:84px;right:18px}.chip-3{bottom:30px;left:18px}.chip-4{bottom:62px;right:18px}

    .trust{padding:18px 0 26px}
    .trust-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}
    .trust-item{
      background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:18px;
      padding:14px 16px;color:var(--muted);font-size:13px;font-weight:600;display:flex;align-items:center;gap:10px;
    }
    .trust-item b{color:#fff}

    .section{padding:42px 0 0}
    .tabs-shell{
      background:var(--grad-panel);border:1px solid var(--line);border-radius:30px;box-shadow:var(--shadow);overflow:hidden;
    }
    .tabs-head{padding:18px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.02)}
    .tabs-intro{margin-bottom:16px}
    .tabs-intro .eyebrow-2{
      color:#aecdff;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.16em;margin-bottom:10px;display:block;
    }
    .tabs-intro h2{
      font-family:'Space Grotesk',sans-serif;font-size:clamp(28px,4vw,44px);
      letter-spacing:-1.4px;line-height:1.06;margin-bottom:10px;
    }
    .tabs-intro p{max-width:700px;color:var(--muted);line-height:1.75;font-size:15px}
    .tabs-nav{display:flex;gap:10px;flex-wrap:wrap}
    .tab-btn{
      padding:12px 18px;border-radius:999px;background:rgba(255,255,255,.03);
      border:1px solid var(--line);color:var(--muted);font-size:13px;font-weight:800;transition:.2s ease;
    }
    .tab-btn.active,.tab-btn:hover{
      background:linear-gradient(135deg,#13284e,#173d72);
      border-color:rgba(96,165,250,.18);color:#fff;
    }

    .tabs-body{padding:20px}
    .tab-panel{display:none;animation:fadeIn .24s ease}
    .tab-panel.active{display:block}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

    .row-head{
      display:flex;align-items:end;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:18px;
    }
    .sub-title{
      font-family:'Space Grotesk',sans-serif;font-size:22px;letter-spacing:-.8px;margin-bottom:6px;
    }
    .sub-copy{color:var(--muted);font-size:14px;line-height:1.7;max-width:680px}

    .pill-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
    .pill{
      padding:10px 15px;border-radius:999px;background:rgba(255,255,255,.03);
      border:1px solid var(--line);color:var(--muted);font-size:12px;font-weight:800;transition:.2s ease;
    }
    .pill.active,.pill:hover{
      background:linear-gradient(135deg,#13284e,#173d72);
      border-color:rgba(96,165,250,.18);color:#fff;
    }

    .grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:16px}
    .card{
      background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.025));
      border:1px solid var(--line);border-radius:22px;overflow:hidden;transition:.24s ease;box-shadow:var(--shadow-soft);
    }
    .card:hover{transform:translateY(-4px);border-color:rgba(96,165,250,.16)}
    .product-media{
      height:170px;display:flex;align-items:center;justify-content:center;position:relative;
      font-size:52px;border-bottom:1px solid var(--line);background:#0d1628;
    }
    .product-media.capinha{background:linear-gradient(135deg,#0d1630,#172852)}
    .product-media.protecao{background:linear-gradient(135deg,#0c1d35,#173967)}
    .product-media.carregador{background:linear-gradient(135deg,#1a102f,#2a225b)}
    .product-media.cabo{background:linear-gradient(135deg,#0b1c22,#12414c)}
    .product-media.audio{background:linear-gradient(135deg,#1c102c,#42225f)}
    .product-media.outro{background:linear-gradient(135deg,#161d12,#324723)}
    .badge{
      position:absolute;top:12px;left:12px;padding:5px 10px;border-radius:999px;
      font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;
    }
    .badge.hot{background:rgba(96,165,250,.17);color:#dbe9ff;border:1px solid rgba(96,165,250,.18)}
    .badge.sale{background:rgba(251,191,36,.15);color:#ffe49e;border:1px solid rgba(251,191,36,.18)}
    .badge.new{background:rgba(52,211,153,.14);color:#c8ffe8;border:1px solid rgba(52,211,153,.18)}
    .card-body{padding:16px}
    .card-title{
      font-family:'Space Grotesk',sans-serif;font-size:17px;letter-spacing:-.5px;margin-bottom:8px;
    }
    .card-text{color:var(--muted);font-size:13px;line-height:1.72;min-height:64px;margin-bottom:14px}
    .card-bottom{display:flex;align-items:end;justify-content:space-between;gap:12px}
    .price small{
      display:block;color:var(--muted-2);text-decoration:line-through;font-size:11px;margin-bottom:3px;min-height:14px;
    }
    .price strong{
      display:block;font-family:'Space Grotesk',sans-serif;font-size:22px;letter-spacing:-.8px;line-height:1;
    }
    .price span{display:block;color:var(--muted);font-size:11px;margin-top:4px}
    .card-actions{display:flex;gap:8px}
    .mini-btn{
      padding:11px 15px;border-radius:999px;background:var(--grad-main);color:#fff;
      font-size:12.5px;font-weight:800;box-shadow:0 10px 24px rgba(59,130,246,.20);
    }
    .ghost-btn{
      padding:11px 14px;border-radius:999px;background:rgba(255,255,255,.04);
      border:1px solid var(--line);color:#fff;font-size:12.5px;font-weight:800;
    }

    .service-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px}
    .service-card{
      background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.025));
      border:1px solid var(--line);border-radius:22px;padding:18px;box-shadow:var(--shadow-soft);
      display:flex;flex-direction:column;gap:14px;
    }
    .service-top{display:flex;align-items:flex-start;gap:14px}
    .service-icon{
      width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;
      background:linear-gradient(135deg,#13284e,#173d72);border:1px solid rgba(96,165,250,.14);
      font-size:20px;flex-shrink:0;
    }
    .service-title{
      font-family:'Space Grotesk',sans-serif;font-size:18px;letter-spacing:-.5px;margin-bottom:4px;
    }
    .service-sub{color:var(--muted);font-size:12px}
    .service-text{color:var(--muted);font-size:13px;line-height:1.72;min-height:66px}
    .service-bottom{display:flex;align-items:end;justify-content:space-between;gap:12px;margin-top:auto}
    .service-price small{
      display:block;color:var(--muted-2);font-size:10px;text-transform:uppercase;letter-spacing:.12em;margin-bottom:4px;
    }
    .service-price strong{
      font-family:'Space Grotesk',sans-serif;font-size:22px;letter-spacing:-.8px;color:#dbf8ea;
    }

    .about-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px;margin-bottom:18px}
    .about-card{
      background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.025));
      border:1px solid var(--line);border-radius:22px;padding:20px;box-shadow:var(--shadow-soft);
    }
    .about-icon{font-size:28px;margin-bottom:14px}
    .about-title{
      font-family:'Space Grotesk',sans-serif;font-size:18px;letter-spacing:-.5px;margin-bottom:8px;
    }
    .about-text{color:var(--muted);font-size:14px;line-height:1.75}

    .mini-accordion{margin-top:14px;display:flex;flex-direction:column;gap:10px}
    .mini-item{
      border:1px solid var(--line);border-radius:16px;overflow:hidden;background:rgba(255,255,255,.025);
    }
    .mini-head{
      width:100%;background:transparent;color:#fff;text-align:left;padding:15px 16px;
      display:flex;align-items:center;justify-content:space-between;gap:12px;font-weight:700;font-size:14px;
    }
    .mini-head span:last-child{color:#9fc6ff;font-size:16px;transition:.2s ease}
    .mini-item.open .mini-head span:last-child{transform:rotate(45deg);color:#fff}
    .mini-body{display:none;padding:0 16px 16px;color:var(--muted);font-size:13.5px;line-height:1.75}
    .mini-item.open .mini-body{display:block}

    .reviews-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px}
    .review-card{
      background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.025));
      border:1px solid var(--line);border-radius:22px;padding:20px;box-shadow:var(--shadow-soft);
    }
    .stars{color:var(--gold);letter-spacing:1px;margin-bottom:12px;font-size:14px}
    .review-text{color:var(--muted);font-size:14px;line-height:1.82;margin-bottom:16px}
    .review-author{display:flex;align-items:center;gap:12px}
    .avatar{
      width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;
      font-weight:800;font-size:13px;border:1px solid rgba(255,255,255,.08);background:#10243e;flex-shrink:0;
    }
    .author-name{font-size:14px;font-weight:700;margin-bottom:3px}
    .author-role{font-size:12px;color:var(--muted)}

    .faq{padding:22px 0 0}
    .faq-shell{
      background:var(--grad-panel);border:1px solid var(--line);border-radius:28px;padding:20px;box-shadow:var(--shadow);
    }
    .faq-title{
      font-family:'Space Grotesk',sans-serif;font-size:28px;letter-spacing:-1px;margin-bottom:8px;
    }
    .faq-sub{color:var(--muted);font-size:14px;line-height:1.75;margin-bottom:18px;max-width:700px}
    .accordion{display:flex;flex-direction:column;gap:12px}
    .acc-item{
      background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.025));
      border:1px solid var(--line);border-radius:18px;overflow:hidden;box-shadow:var(--shadow-soft);
    }
    .acc-head{
      width:100%;backgr
