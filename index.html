<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>SmartFlix — Assistência Técnica & Acessórios Premium · Porto Velho</title>
  <meta name="description" content="SmartFlix em Porto Velho: assistência técnica premium para celular, troca de tela, bateria, conector, dano por água e acessórios selecionados." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,700;0,800;0,900;1,700;1,800;1,900&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#eef2ee;
      --surface:#ffffff;
      --text:#091009;
      --text-soft:#374840;
      --muted:#637069;
      --line:#d8e4da;
      --line-2:#c8d8ca;

      --g1:#0d9146;
      --g2:#0a7538;
      --g3:#075c2b;
      --g-soft:#dff3e8;
      --g-softer:#eef8f2;
      --g-glow:rgba(13,145,70,.14);

      --ink:#070e08;
      --ink-2:#0c1a0e;
      --ink-3:#0e2a14;
      --ink-4:#0a3d1c;

      --gold:#8f6a1a;

      --grad-g:linear-gradient(138deg,#18ba5c 0%,#0b8c40 55%,#075e2b 100%);
      --grad-g-vivid:linear-gradient(138deg,#20d467 0%,#0ea84d 50%,#077a34 100%);
      --grad-dark:linear-gradient(148deg,#070e08 0%,#0c1d10 35%,#0d2e16 65%,#0b401e 100%);

      --sh-xs:0 1px 3px rgba(7,14,8,.05);
      --sh-sm:0 2px 10px rgba(7,14,8,.07),0 1px 2px rgba(7,14,8,.04);
      --sh:0 6px 22px rgba(7,14,8,.08),0 2px 6px rgba(7,14,8,.04);
      --sh-md:0 14px 44px rgba(7,14,8,.10),0 4px 12px rgba(7,14,8,.05);
      --sh-lg:0 28px 72px rgba(7,14,8,.12),0 8px 22px rgba(7,14,8,.06);
      --sh-xl:0 44px 110px rgba(7,14,8,.14),0 12px 32px rgba(7,14,8,.07);
      --sh-green:0 6px 28px rgba(13,145,70,.24),0 2px 8px rgba(13,145,70,.14);
      --sh-green-lg:0 18px 52px rgba(13,145,70,.30),0 5px 16px rgba(13,145,70,.18);
      --sh-phone:0 56px 110px rgba(7,14,8,.44),0 18px 46px rgba(7,14,8,.28);

      --font-body:'Plus Jakarta Sans', sans-serif;
      --font-display:'Playfair Display', serif;

      --container:min(1180px, calc(100% - 32px));
      --r:18px;
      --r-lg:26px;
      --r-xl:32px;
      --r-2xl:44px;

      --mobile-nav-h:74px;
      --view-ease:cubic-bezier(.22,.61,.36,1);
    }

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
    body{font-family:var(--font-body);color:var(--text);background:var(--bg);overflow-x:hidden;-webkit-tap-highlight-color:transparent}
    a{text-decoration:none;color:inherit}
    button{font:inherit;border:none;background:none;cursor:pointer}
    img{display:block;max-width:100%}
    .container{width:var(--container);margin:0 auto}

    .topbar{
      background:var(--ink);
      color:rgba(255,255,255,.52);
      font-size:12px;
      font-weight:500;
      padding:11px 0;
      text-align:center;
      letter-spacing:.03em;
      position:relative;
      overflow:hidden;
    }
    .topbar::before{
      content:'';
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      width:360px;
      height:56px;
      background:radial-gradient(ellipse, rgba(13,145,70,.2), transparent 70%);
      pointer-events:none;
    }
    .topbar strong{color:#5ae490;font-weight:700}

    .nav{
      position:sticky;
      top:0;
      z-index:60;
      background:rgba(238,242,238,.93);
      backdrop-filter:blur(22px) saturate(1.9);
      -webkit-backdrop-filter:blur(22px) saturate(1.9);
      border-bottom:1px solid rgba(13,145,70,.09);
    }
    .nav-inner{
      min-height:70px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:20px;
    }

    .brand{display:flex;align-items:center;gap:11px;min-width:0}
    .brand-badge{
      width:40px;height:40px;border-radius:12px;
      background:var(--grad-g);
      color:#fff;
      display:flex;align-items:center;justify-content:center;
      flex-shrink:0;
      box-shadow:var(--sh-green);
      font-size:16px;
      position:relative;
      overflow:hidden;
    }
    .brand-badge::after{
      content:'';
      position:absolute;inset:0;
      background:linear-gradient(135deg, rgba(255,255,255,.28) 0%, transparent 52%);
      pointer-events:none;
    }
    .brand-text{display:flex;flex-direction:column}
    .brand-name{
      font-family:var(--font-display);
      font-size:21px;
      font-weight:700;
      line-height:1;
      letter-spacing:-.2px;
      color:var(--text);
      font-style:italic;
    }
    .brand-name sup{
      font-family:var(--font-body);
      font-size:8px;
      font-weight:800;
      letter-spacing:.12em;
      text-transform:uppercase;
      vertical-align:super;
      color:var(--g1);
      font-style:normal;
      margin-left:2px;
      opacity:.9;
    }
    .brand-sub{
      font-size:9.5px;
      color:var(--muted);
      margin-top:3px;
      font-weight:600;
      letter-spacing:.07em;
      text-transform:uppercase;
    }

    .nav-links{display:flex;align-items:center;gap:2px}
    .nav-links a{
      padding:8px 13px;
      border-radius:999px;
      color:var(--text-soft);
      font-size:13px;
      font-weight:700;
      letter-spacing:-.01em;
      transition:all .16s;
    }
    .nav-links a:hover{
      background:rgba(255,255,255,.92);
      color:var(--text);
      box-shadow:var(--sh-sm);
    }
    .nav-cta{
      background:var(--grad-g)!important;
      color:#fff!important;
      box-shadow:var(--sh-green)!important;
      font-weight:800!important;
      padding:9px 17px!important;
      transition:all .18s!important;
    }
    .nav-cta:hover{
      transform:translateY(-1px);
      box-shadow:var(--sh-green-lg)!important;
    }

    .menu-btn{
      display:none;
      width:40px;height:40px;border-radius:11px;
      background:#fff;
      border:1px solid var(--line);
      box-shadow:var(--sh-sm);
      color:var(--text);
      font-size:17px;
      align-items:center;
      justify-content:center;
    }

    .mobile-menu{
      position:fixed;
      inset:0;
      background:rgba(238,242,238,.97);
      backdrop-filter:blur(20px);
      -webkit-backdrop-filter:blur(20px);
      opacity:0;
      pointer-events:none;
      transition:.22s;
      z-index:80;
    }
    .mobile-menu.show{opacity:1;pointer-events:auto}
    .mobile-inner{
      min-height:100vh;
      width:var(--container);
      margin:0 auto;
      padding:18px 0 28px;
      display:flex;
      flex-direction:column;
    }
    .mobile-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
    .mobile-close{
      width:40px;height:40px;border-radius:11px;
      background:#fff;border:1px solid var(--line);
      box-shadow:var(--sh-sm);
      font-size:17px;color:var(--text);
    }
    .mobile-links{display:flex;flex-direction:column;gap:9px}
    .mobile-links a{
      background:#fff;
      border:1px solid var(--line);
      border-radius:14px;
      padding:14px 16px;
      font-weight:700;
      box-shadow:var(--sh-sm);
    }
    .mobile-links a.mobile-cta{
      background:var(--grad-g);
      color:#fff;
      border:none;
      box-shadow:var(--sh-green);
    }

    .hero{
      padding:0;
      background:var(--ink);
      position:relative;
      overflow:hidden;
      min-height:100vh;
      display:flex;
      align-items:center;
    }
    .hero::before{
      content:'';
      position:absolute;inset:0;
      background:
        radial-gradient(ellipse 65% 55% at 84% 26%, rgba(13,145,70,.22) 0%, transparent 55%),
        radial-gradient(ellipse 45% 65% at 6% 80%, rgba(13,145,70,.11) 0%, transparent 50%),
        radial-gradient(ellipse 30% 30% at 52% 2%, rgba(255,255,255,.035) 0%, transparent 48%),
        var(--grad-dark);
      pointer-events:none;
    }
    .hero::after{
      content:'';
      position:absolute;inset:0;
      background-image:
        linear-gradient(rgba(255,255,255,.022) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.022) 1px, transparent 1px);
      background-size:52px 52px;
      pointer-events:none;
    }
    .hero-inner{
      position:relative;
      z-index:2;
      width:var(--container);
      margin:0 auto;
      padding:96px 0 76px;
      display:grid;
      grid-template-columns:1.12fr .88fr;
      gap:64px;
      align-items:center;
    }

    .eyebrow{
      display:inline-flex;align-items:center;gap:9px;
      padding:7px 13px;border-radius:999px;
      background:rgba(13,145,70,.16);
      border:1px solid rgba(13,145,70,.32);
      color:#68eaa0;
      font-size:10.5px;
      font-weight:800;
      letter-spacing:.12em;
      text-transform:uppercase;
      margin-bottom:26px;
      backdrop-filter:blur(6px);
    }
    .eyebrow-dot{
      width:5px;height:5px;border-radius:50%;
      background:#3ee07c;
      box-shadow:0 0 0 4px rgba(62,224,124,.18);
      animation:blink 2.6s ease infinite;
    }
    @keyframes blink{
      0%,100%{opacity:1;box-shadow:0 0 0 4px rgba(62,224,124,.18)}
      50%{opacity:.5;box-shadow:0 0 0 6px rgba(62,224,124,.06)}
    }

    .hero-title{
      font-family:var(--font-display);
      font-size:clamp(50px, 6.2vw, 90px);
      line-height:.88;
      letter-spacing:-2.5px;
      color:#fff;
      margin-bottom:8px;
    }
    .hero-title .t-dim{
      font-style:normal;
      font-size:.88em;
      color:rgba(255,255,255,.42);
      display:block;
      letter-spacing:-2px;
      margin-bottom:4px;
      font-weight:700;
    }
    .hero-title .t-main{display:block;font-style:italic;font-weight:800}
    .hero-title .t-green{
      color:#3ee07c;
      display:block;
      font-style:italic;
      font-size:.82em;
      font-weight:700;
      letter-spacing:-1.5px;
      margin-top:6px;
    }

    .hero-divider{
      width:40px;height:1.5px;
      background:linear-gradient(90deg, rgba(62,224,124,.7), transparent);
      margin:22px 0;
      border-radius:999px;
    }
    .hero-sub{
      font-size:16px;
      line-height:1.82;
      color:rgba(255,255,255,.52);
      max-width:480px;
      margin-bottom:32px;
      font-weight:400;
    }

    .hero-actions{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:44px}
    .btn{
      display:inline-flex;align-items:center;justify-content:center;gap:8px;
      padding:14px 22px;border-radius:999px;
      font-size:13.5px;font-weight:800;
      font-family:var(--font-body);
      transition:all .2s;
      white-space:nowrap;
      letter-spacing:-.01em;
    }
    .btn-primary{
      background:var(--grad-g);
      color:#fff;
      box-shadow:var(--sh-green-lg);
    }
    .btn-primary:hover{
      transform:translateY(-2px);
      box-shadow:0 22px 54px rgba(13,145,70,.38), 0 7px 18px rgba(13,145,70,.22);
    }
    .btn-primary:active{transform:translateY(0)}
    .btn-ghost-dark{
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.16);
      color:rgba(255,255,255,.84);
      backdrop-filter:blur(8px);
    }
    .btn-ghost-dark:hover{
      background:rgba(255,255,255,.13);
      border-color:rgba(255,255,255,.22);
    }

    .lux-strip{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:22px}
    .lux-pill{
      padding:5px 11px;
      border-radius:999px;
      background:rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.11);
      font-size:11px;
      font-weight:700;
      color:rgba(255,255,255,.58);
      letter-spacing:.01em;
    }

    .hero-metrics{
      display:grid;
      grid-template-columns:repeat(4, minmax(0,1fr));
      gap:1px;
      background:rgba(255,255,255,.06);
      border-radius:14px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.07);
    }
    .metric{
      padding:17px 15px;
      background:rgba(255,255,255,.035);
      transition:background .18s;
    }
    .metric:hover{background:rgba(255,255,255,.065)}
    .metric strong{
      display:block;
      font-family:var(--font-display);
      font-size:26px;
      line-height:1;
      letter-spacing:-1px;
      color:#fff;
      margin-bottom:5px;
    }
    .metric span{
      display:block;
      font-size:10.5px;
      color:rgba(255,255,255,.42);
      line-height:1.5;
      font-weight:600;
      letter-spacing:.01em;
    }

    .hero-visual{
      position:relative;
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:580px;
    }
    .hero-ring,.hero-ring-2,.hero-ring-3{
      position:absolute;
      border-radius:50%;
      top:50%;left:50%;
      transform:translate(-50%,-50%);
      pointer-events:none;
    }
    .hero-ring{width:400px;height:400px;border:1px solid rgba(13,145,70,.14)}
    .hero-ring-2{width:300px;height:300px;border:1px solid rgba(13,145,70,.09)}
    .hero-ring-3{width:500px;height:500px;border:1px solid rgba(255,255,255,.035)}
    .hero-glow{
      position:absolute;
      width:260px;height:260px;border-radius:50%;
      background:radial-gradient(circle, rgba(13,145,70,.28) 0%, transparent 70%);
      top:50%;left:50%;
      transform:translate(-50%,-50%);
      filter:blur(44px);
      pointer-events:none;
    }

    .phone-wrap{position:relative;z-index:2}
    .phone{
      width:268px;height:522px;border-radius:48px;
      background:linear-gradient(168deg, #1a2a1e, #0d1510);
      padding:11px;
      box-shadow:var(--sh-phone), inset 0 1px 0 rgba(255,255,255,.11), inset 0 -1px 0 rgba(0,0,0,.38);
      position:relative;
    }
    .phone::before{
      content:'';
      position:absolute;inset:0;
      border-radius:48px;
      border:1px solid rgba(255,255,255,.1);
      pointer-events:none;
    }
    .phone::after{
      content:'';
      position:absolute;
      top:7px;left:50%;
      transform:translateX(-50%);
      width:80px;height:9px;border-radius:999px;
      background:rgba(0,0,0,.75);
      z-index:3;
    }
    .screen{
      width:100%;height:100%;
      border-radius:38px;
      background:linear-gradient(180deg, #f5faf7, #ecf4ef);
      overflow:hidden;
      position:relative;
      padding:15px;
      display:flex;
      flex-direction:column;
    }
    .screen::before{
      content:'';
      position:absolute;
      top:0;left:0;right:0;height:80px;
      background:linear-gradient(180deg, rgba(255,255,255,.65), transparent);
      pointer-events:none;
      z-index:1;
    }
    .screen-top{
      height:138px;
      border-radius:22px;
      background:linear-gradient(135deg, #e4f7ec, #cef0db);
      border:1px solid rgba(13,145,70,.14);
      padding:13px;
      margin-bottom:10px;
      position:relative;
      overflow:hidden;
    }
    .screen-top::after{
      content:'';
      position:absolute;inset:0;
      background:linear-gradient(135deg, rgba(255,255,255,.46), transparent 48%);
      pointer-events:none;
    }
    .screen-top .sbar{
      height:7px;border-radius:999px;
      background:rgba(13,145,70,.18);
      margin-bottom:7px;
      position:relative;
      z-index:1;
    }
    .screen-top .sbar:nth-child(1){width:76%}
    .screen-top .sbar:nth-child(2){width:50%}
    .screen-top .sbar:nth-child(3){
      width:64%;
      height:24px;
      border-radius:9px;
      margin-top:9px;
      background:rgba(13,145,70,.10);
    }
    .screen-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
      flex:1;
    }
    .mini-card{
      background:rgba(255,255,255,.94);
      border:1px solid rgba(215,228,218,.8);
      border-radius:14px;
      box-shadow:var(--sh-sm);
      padding:10px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
    }
    .mini-icon{
      width:34px;height:34px;border-radius:9px;
      background:var(--g-soft);
      display:flex;align-items:center;justify-content:center;
      font-size:15px;
    }
    .mini-lines span{
      display:block;
      height:5px;
      border-radius:999px;
      background:rgba(100,120,108,.11);
      margin-top:5px;
    }
    .mini-lines span:nth-child(1){width:78%}
    .mini-lines span:nth-child(2){width:48%}

    .floating-chip{
      position:absolute;
      background:rgba(255,255,255,.97);
      border:1px solid rgba(255,255,255,.99);
      border-bottom:1px solid rgba(215,228,218,.9);
      border-radius:13px;
      padding:10px 13px;
      box-shadow:var(--sh-md);
      z-index:3;
      min-width:138px;
      backdrop-filter:blur(14px);
      transition:transform .32s ease;
    }
    .floating-chip:hover{transform:translateY(-4px)!important}
    .floating-chip small{
      display:block;
      font-size:8.5px;
      text-transform:uppercase;
      letter-spacing:.14em;
      color:var(--muted);
      margin-bottom:4px;
      font-weight:700;
    }
    .floating-chip strong{
      display:block;
      font-size:12.5px;
      font-weight:800;
      color:var(--text);
    }
    .chip-dot{
      display:inline-block;
      width:5px;height:5px;border-radius:50%;
      background:var(--g1);
      margin-right:4px;
      vertical-align:middle;
    }
    .chip-a{top:60px;left:-28px}
    .chip-b{top:96px;right:-18px}
    .chip-c{bottom:96px;left:-22px}
    .chip-d{bottom:134px;right:-16px}

    .trust{padding:36px 0 0}
    .trust-grid{display:grid;grid-template-columns:repeat(4, minmax(0,1fr));gap:10px}
    .trust-item{
      background:#fff;
      border:1px solid var(--line);
      border-radius:var(--r-lg);
      padding:18px 16px;
      box-shadow:var(--sh-sm);
      display:flex;
      align-items:flex-start;
      gap:13px;
      transition:all .2s;
    }
    .trust-item:hover{transform:translateY(-3px);box-shadow:var(--sh-md)}
    .trust-icon{
      width:44px;height:44px;border-radius:13px;
      background:var(--g-softer);
      border:1px solid rgba(13,145,70,.13);
      color:var(--g2);
      display:flex;align-items:center;justify-content:center;
      font-size:19px;
      flex-shrink:0;
    }
    .trust-item b{
      display:block;
      margin-bottom:3px;
      font-size:13.5px;
      font-weight:800;
    }
    .trust-item span{
      font-size:11.5px;
      color:var(--muted);
      line-height:1.5;
    }

    .section{padding:36px 0 0}
    .panel{
      background:#fff;
      border:1px solid var(--line);
      border-radius:var(--r-2xl);
      box-shadow:var(--sh-xl);
      overflow:hidden;
      position:relative;
    }
    .panel::before{
      content:'';
      position:absolute;
      top:0;left:0;right:0;height:1px;
      background:linear-gradient(90deg, transparent, rgba(13,145,70,.28) 28%, rgba(13,145,70,.28) 72%, transparent);
      pointer-events:none;
      z-index:1;
    }
    .panel-head{
      padding:30px 32px;
      border-bottom:1px solid var(--line);
      background:linear-gradient(155deg, #fff 0%, #f7fbf8 100%);
      position:relative;
      overflow:hidden;
    }
    .panel-head::after{
      content:'';
      position:absolute;
      right:-70px;top:-70px;
      width:260px;height:260px;border-radius:50%;
      background:radial-gradient(circle, rgba(13,145,70,.055), transparent 70%);
      pointer-events:none;
    }
    .panel-kicker{
      display:inline-flex;align-items:center;gap:9px;
      font-size:10px;font-weight:800;
      text-transform:uppercase;
      letter-spacing:.22em;
      color:var(--g2);
      margin-bottom:13px;
      position:relative;
      z-index:1;
    }
    .panel-kicker::before{
      content:'';
      width:20px;height:1.5px;
      background:var(--g1);
      border-radius:999px;
    }
    .panel-title{
      font-family:var(--font-display);
      font-size:clamp(28px, 3.6vw, 48px);
      line-height:1.02;
      letter-spacing:-.8px;
      margin-bottom:12px;
      max-width:760px;
      color:var(--text);
      position:relative;
      z-index:1;
      font-style:italic;
    }
    .panel-title em{font-style:normal;color:var(--g2)}
